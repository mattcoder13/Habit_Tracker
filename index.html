<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Habit Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="habit-manifest.json"/>
  <meta name="theme-color" content="#7db87d"/>
  <link rel="apple-touch-icon" href="habit-icon-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Habits"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0f0a;
      --bg2:       #0f180f;
      --bg3:       #0d140d;
      --border:    #1a2a1a;
      --border2:   #1e2e1e;
      --green:     #7db87d;
      --green-dim: #3a6a3a;
      --green-dark:#1e3a1e;
      --green-pale:#c8e0c8;
      --text:      #e8e6df;
      --text2:     #c8c5bc;
      --muted:     #5a6a5a;
      --muted2:    #4a5a4a;
      --muted3:    #2e3e2e;
      --red:       #e07070;
      --red-bg:    #2a1515;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }

    button, input { font-family: inherit; }
    input { -webkit-appearance: none; appearance: none; }
    svg { display: inline-block; vertical-align: middle; }

    .app { padding: 1.5rem 1rem 5rem; max-width: 680px; margin: 0 auto; }

    /* ── HEADER ── */
    .header {
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(36px, 10vw, 52px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .title em {
      font-style: italic;
      color: var(--green);
    }

    .date-line {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-line::before {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--green-dim);
    }

    /* ── STATS BAR ── */
    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .stat { flex: 1; padding: 10px 8px; text-align: center; background: var(--bg2); }
    .stat-val { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 20px; color: var(--green); line-height: 1; }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

    /* ── CALENDAR GRID ── */
    .grid-section { margin-bottom: 1.5rem; }

    .grid-label {
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .grid-cell {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      background: var(--border);
      position: relative;
      cursor: default;
      transition: transform 0.15s;
    }

    .grid-cell.full { background: var(--green); }
    .grid-cell.partial { background: var(--green-dim); }
    .grid-cell.today { outline: 1.5px solid var(--green); outline-offset: 1px; }

    /* ── TODAY SECTION ── */
    .section-label {
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    .habits-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes popIn   { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

    .habit-row:active { background: var(--bg3); border-color: var(--green-dim); }
    .habit-row.checked { border-color: var(--green-dim); }

    .habit-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--muted3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .habit-row.checked .habit-check {
      background: var(--green);
      border-color: var(--green);
      animation: popIn 0.2s ease-out;
    }

    .habit-body { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 14px;
      color: var(--text2);
      font-weight: 400;
      line-height: 1.3;
    }

    .habit-row.checked .habit-name { color: var(--muted); text-decoration: line-through; }

    .habit-meta {
      display: flex;
      gap: 10px;
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted2);
      align-items: center;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: var(--green);
    }

    .streak-badge.zero { color: var(--muted2); }

    .habit-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      color: var(--muted3);
      -webkit-tap-highlight-color: transparent;
      border-radius: 3px;
    }

    .icon-btn:active { color: var(--red); }

    /* ── ADD HABIT ── */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .habit-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .habit-input::placeholder { color: var(--muted3); }
    .habit-input:focus { border-color: var(--green); }

    .add-btn {
      background: var(--green);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 16px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .add-btn:active { opacity: 0.8; }
    .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted2);
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .empty-sub { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted3); }

    /* ── WEEKLY VIEW ── */
    .weekly { margin-bottom: 1.5rem; }

    .week-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .week-row:last-child { border-bottom: none; }

    .week-name {
      font-size: 12px;
      color: var(--text2);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .week-dots { display: flex; gap: 4px; }

    .week-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border2);
    }

    .week-dot.done { background: var(--green); }
    .week-dot.today-dot { outline: 1.5px solid var(--green); outline-offset: 1px; }

    .week-pct {
      font-size: 10px;
      color: var(--muted2);
      width: 32px;
      text-align: right;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal-bg.open { display: flex; animation: fadeIn 0.15s ease-out; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 320px;
      width: 100%;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .modal-msg { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-btn {
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .modal-btn.danger { background: var(--red-bg); border-color: #5a2020; color: var(--red); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--green-dim);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 200;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .toast.visible { display: block; animation: toastIn 0.3s ease-out; }
    @keyframes toastIn { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--bg2);
      color: var(--muted);
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, background 0.15s;
    }

    .tab.active { background: var(--bg3); color: var(--green); }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="title">Habit<br><em>Tracker</em></div>
    <div class="date-line" id="date-line"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-val" id="stat-today">0/0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-streak">0</div>
      <div class="stat-label">Best streak</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-week">0%</div>
      <div class="stat-label">This week</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">Total done</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs" style="display:none">
    <button class="tab active" onclick="switchTab('today')">Today</button>
    <button class="tab" onclick="switchTab('weekly')">Weekly</button>
    <button class="tab" onclick="switchTab('calendar')">Calendar</button>
  </div>

  <!-- ADD HABIT -->
  <div class="add-row">
    <input class="habit-input" id="habit-input" type="text" placeholder="Add a new habit..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="add-btn" id="add-btn" onclick="handleAdd()">+ Add</button>
  </div>

  <!-- TODAY TAB -->
  <div id="tab-today">
    <div class="section-label">Today's habits</div>
    <div class="habits-list" id="habits-list"></div>
    <div id="empty-state" class="empty" style="display:none">
      <div class="empty-title">Nothing yet</div>
      <div class="empty-sub">Add your first habit above</div>
    </div>
  </div>

  <!-- WEEKLY TAB -->
  <div id="tab-weekly" style="display:none">
    <div class="section-label">Last 7 days</div>
    <div class="weekly" id="weekly-list"></div>
  </div>

  <!-- CALENDAR TAB -->
  <div id="tab-calendar" style="display:none">
    <div class="section-label">Last 90 days</div>
    <div class="grid-section">
      <div class="grid" id="cal-grid"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn danger" id="modal-confirm"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──────────────────────────────────────────────
  const KEY = 'habittracker_v1';
  let habits = [];   // [{ id, name, createdAt }]
  let log = {};      // { 'YYYY-MM-DD': [habitId, ...] }
  let activeTab = 'today';

  // ── HELPERS ────────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }

  function dateStr(d) {
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function dayName(d) {
    return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  }

  function fullDayName(d) {
    return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
  }

  function monthName(d) {
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  }

  function isCheckedToday(habitId) {
    const t = todayStr();
    return (log[t] || []).includes(habitId);
  }

  function getStreak(habitId) {
    let streak = 0;
    const d = new Date();
    // Start from yesterday if not yet checked today, or today if checked
    if (!isCheckedToday(habitId)) d.setDate(d.getDate() - 1);
    while (true) {
      const s = dateStr(d);
      if ((log[s] || []).includes(habitId)) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return streak;
  }

  function getBestStreak(habitId) {
    let best = 0, cur = 0;
    // Check last 365 days
    const d = new Date();
    for (let i = 0; i < 365; i++) {
      const s = dateStr(d);
      if ((log[s] || []).includes(habitId)) {
        cur++;
        if (cur > best) best = cur;
      } else {
        cur = 0;
      }
      d.setDate(d.getDate() - 1);
    }
    return best;
  }

  function getOverallBestStreak() {
    if (!habits.length) return 0;
    // A "perfect day" is when ALL habits are checked
    let best = 0, cur = 0;
    const d = new Date();
    for (let i = 0; i < 365; i++) {
      const s = dateStr(d);
      const checked = log[s] || [];
      const allDone = habits.every(h => checked.includes(h.id));
      if (allDone && habits.length > 0) { cur++; if (cur > best) best = cur; }
      else cur = 0;
      d.setDate(d.getDate() - 1);
    }
    return best;
  }

  function getWeekCompletion() {
    if (!habits.length) return 0;
    let total = 0, done = 0;
    const d = new Date();
    for (let i = 0; i < 7; i++) {
      const s = dateStr(d);
      const checked = log[s] || [];
      habits.forEach(h => {
        total++;
        if (checked.includes(h.id)) done++;
      });
      d.setDate(d.getDate() - 1);
    }
    return total ? Math.round((done / total) * 100) : 0;
  }

  function getTotalDone() {
    let count = 0;
    Object.values(log).forEach(arr => { count += arr.length; });
    return count;
  }

  // ── PERSIST ────────────────────────────────────────────
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ habits, log })); } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) { const p = JSON.parse(raw); habits = p.habits || []; log = p.log || {}; }
    } catch(e) {}
  }

  // ── ADD HABIT ──────────────────────────────────────────
  function handleAdd() {
    const inp = document.getElementById('habit-input');
    const name = inp.value.trim();
    if (!name) return;
    if (habits.find(h => h.name.toLowerCase() === name.toLowerCase())) {
      toast('Habit already exists'); return;
    }
    habits.push({ id: Date.now(), name, createdAt: Date.now() });
    inp.value = '';
    save();
    render();
    inp.focus();
  }

  // ── TOGGLE ─────────────────────────────────────────────
  function toggleHabit(id) {
    const t = todayStr();
    if (!log[t]) log[t] = [];
    const idx = log[t].indexOf(id);
    if (idx === -1) {
      log[t].push(id);
      // Check if all done
      if (habits.every(h => log[t].includes(h.id))) toast('🌿 All habits done today!');
    } else {
      log[t].splice(idx, 1);
    }
    save();
    render();
  }

  // ── DELETE HABIT ───────────────────────────────────────
  function deleteHabit(id) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    showModal('Delete habit?', '"' + h.name + '" and all its history will be removed.', 'Delete', () => {
      habits = habits.filter(h => h.id !== id);
      // Remove from log too
      Object.keys(log).forEach(d => {
        log[d] = log[d].filter(i => i !== id);
        if (!log[d].length) delete log[d];
      });
      save(); render();
      toast('Habit removed');
    });
  }

  // ── TABS ───────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    ['today','weekly','calendar'].forEach(t => {
      document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['today','weekly','calendar'][i] === tab);
    });
    if (tab === 'weekly') renderWeekly();
    if (tab === 'calendar') renderCalendar();
  }

  // ── RENDER TODAY ───────────────────────────────────────
  function renderToday() {
    const list = document.getElementById('habits-list');
    const empty = document.getElementById('empty-state');

    if (!habits.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const t = todayStr();
    const sorted = [...habits].sort((a, b) => {
      const ac = (log[t]||[]).includes(a.id) ? 1 : 0;
      const bc = (log[t]||[]).includes(b.id) ? 1 : 0;
      return ac - bc;
    });

    list.innerHTML = sorted.map(h => {
      const checked = (log[t]||[]).includes(h.id);
      const streak = getStreak(h.id);
      return '<div class="habit-row ' + (checked ? 'checked' : '') + '" onclick="toggleHabit(' + h.id + ')">' +
        '<div class="habit-check">' +
          (checked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="' + getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() + '" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
        '</div>' +
        '<div class="habit-body">' +
          '<div class="habit-name">' + escHtml(h.name) + '</div>' +
          '<div class="habit-meta">' +
            '<span class="streak-badge ' + (streak === 0 ? 'zero' : '') + '">' +
              (streak > 0 ? '🔥 ' + streak + ' day' + (streak > 1 ? 's' : '') : '— no streak') +
            '</span>' +
          '</div>' +
        '</div>' +
        '<div class="habit-actions">' +
          '<button class="icon-btn" onclick="event.stopPropagation();deleteHabit(' + h.id + ')">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── RENDER WEEKLY ──────────────────────────────────────
  function renderWeekly() {
    const list = document.getElementById('weekly-list');
    if (!habits.length) { list.innerHTML = '<div class="empty"><div class="empty-sub">No habits yet</div></div>'; return; }

    const days = [];
    const d = new Date();
    for (let i = 6; i >= 0; i--) {
      const dd = new Date(d);
      dd.setDate(d.getDate() - i);
      days.push(dd);
    }
    const today = todayStr();

    list.innerHTML = habits.map(h => {
      const dots = days.map(day => {
        const s = dateStr(day);
        const done = (log[s]||[]).includes(h.id);
        const isToday = s === today;
        return '<div class="week-dot ' + (done ? 'done' : '') + ' ' + (isToday ? 'today-dot' : '') + '" title="' + dayName(day) + '"></div>';
      }).join('');

      const doneDays = days.filter(day => (log[dateStr(day)]||[]).includes(h.id)).length;
      const pct = Math.round((doneDays / 7) * 100);

      return '<div class="week-row">' +
        '<div class="week-name">' + escHtml(h.name) + '</div>' +
        '<div class="week-dots">' + dots + '</div>' +
        '<div class="week-pct">' + pct + '%</div>' +
      '</div>';
    }).join('');
  }

  // ── RENDER CALENDAR ────────────────────────────────────
  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    const today = todayStr();
    const cells = [];
    const d = new Date();

    for (let i = 89; i >= 0; i--) {
      const dd = new Date(d);
      dd.setDate(d.getDate() - i);
      const s = dateStr(dd);
      const checked = (log[s]||[]);
      const total = habits.length;
      let cls = '';
      if (total > 0) {
        const ratio = checked.length / total;
        if (ratio === 1) cls = 'full';
        else if (ratio > 0) cls = 'partial';
      }
      const isToday = s === today;
      cells.push('<div class="grid-cell ' + cls + ' ' + (isToday ? 'today' : '') + '" title="' + s + '"></div>');
    }
    grid.innerHTML = cells.join('');
  }

  // ── RENDER STATS ───────────────────────────────────────
  function renderStats() {
    const show = habits.length > 0;
    document.getElementById('stats').style.display = show ? 'flex' : 'none';
    document.getElementById('tabs').style.display = show ? 'flex' : 'none';
    if (!show) return;

    const t = todayStr();
    const checked = (log[t]||[]).filter(id => habits.find(h => h.id === id)).length;
    document.getElementById('stat-today').textContent = checked + '/' + habits.length;
    document.getElementById('stat-streak').textContent = getOverallBestStreak();
    document.getElementById('stat-week').textContent = getWeekCompletion() + '%';
    document.getElementById('stat-total').textContent = getTotalDone();
  }

  // ── RENDER DATE ────────────────────────────────────────
  function renderDate() {
    const d = new Date();
    document.getElementById('date-line').textContent =
      fullDayName(d) + ', ' + monthName(d) + ' ' + d.getDate() + ' ' + d.getFullYear();
  }

  // ── RENDER ALL ─────────────────────────────────────────
  function render() {
    renderDate();
    renderStats();
    renderToday();
    if (activeTab === 'weekly') renderWeekly();
    if (activeTab === 'calendar') renderCalendar();
  }

  // ── MODAL ──────────────────────────────────────────────
  function showModal(title, msg, confirmText, onConfirm) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    const btn = document.getElementById('modal-confirm');
    btn.textContent = confirmText;
    btn.onclick = () => { closeModal(); onConfirm(); };
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  // ── TOAST ──────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('visible'), 2500);
  }

  // ── UTILS ──────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── NOTIFICATIONS ──────────────────────────────────────
  async function initNotifications() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') await Notification.requestPermission();
    if (Notification.permission === 'granted') scheduleReminder();
  }

  function scheduleReminder() {
    if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') return;
    navigator.serviceWorker.ready.then(reg => {
      if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_HABIT_REMINDER', hour: 7 });
    });
  }

  // ── INIT ───────────────────────────────────────────────
  document.getElementById('habit-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleAdd(); });
  document.getElementById('add-btn').disabled = false;

  load();
  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/habit-sw.js')
        .then(() => { console.log('Habit SW registered'); initNotifications(); })
        .catch(e => console.warn('Habit SW failed:', e));
    });
  }
</script>
</body>
</html>
